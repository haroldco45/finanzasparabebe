<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas para Bebé - Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .paywall { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .paywall.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans">

    <div id="paywall" class="paywall">
        <div class="bg-white p-8 rounded-3xl shadow-2xl border-2 border-indigo-500 max-w-sm">
            <span class="text-6xl">🔒</span>
            <h2 class="text-2xl font-black text-gray-800 mt-4 uppercase">Suscripción Vencida</h2>
            <p class="text-gray-500 text-sm mt-2">Activa tu mes por <b>1 DÓLAR</b> con <b>Vibras Positivas</b>.</p>
            <button onclick="contactarSoporte()" class="w-full mt-6 bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase">Activar Ahora</button>
        </div>
    </div>

    <div id="appContent" class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-6 border border-gray-100">
        
        <div class="text-center mb-5">
            <h1 class="text-2xl font-black text-indigo-700 italic uppercase">👶 Finanzas para Bebé</h1>
            <p class="text-[9px] text-gray-400 font-bold tracking-[0.3em] uppercase">Vibras Positivas © 2026</p>
        </div>

        <div class="bg-gradient-to-br from-indigo-600 to-purple-700 p-7 rounded-3xl mb-5 text-white shadow-xl relative">
            <p class="text-[10px] opacity-80 uppercase font-black italic">Saldo Disponible (COL)</p>
            <p id="saldoActual" class="text-5xl font-black tracking-tighter mt-1">$0</p>
            <div id="fechaHora" class="absolute top-4 right-5 text-[9px] font-mono opacity-70 text-right"></div>
        </div>

        <div id="setupSaldo" class="mb-6 p-5 bg-amber-50 rounded-2xl border border-amber-100">
            <p class="text-[11px] font-black text-amber-700 mb-3 uppercase italic">💰 Paso 1: Saldo Inicial</p>
            <div class="flex gap-2">
                <input type="number" id="saldoInput" placeholder="¿Cuánto tienes hoy?" class="flex-1 p-3 rounded-xl border-none outline-none text-sm">
                <button onclick="fijarSaldoInicial()" class="bg-amber-500 text-white px-5 py-3 rounded-xl font-black text-xs uppercase">Fijar</button>
            </div>
        </div>

        <div class="space-y-3 mb-6">
            <input type="text" id="concepto" placeholder="Concepto (Ej: Venta Arroz)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-semibold">
            <input type="number" id="monto" placeholder="Valor $" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-semibold">
            
            <div class="flex gap-3">
                <button onclick="registrar('INGRESO')" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-black text-xs shadow-lg uppercase">➕ Ingreso</button>
                <button onclick="registrar('EGRESO')" class="flex-1 bg-rose-500 text-white py-4 rounded-2xl font-black text-xs shadow-lg uppercase">➖ Egreso</button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Movimientos</h2>
            <button onclick="enviarWhatsApp()" class="text-emerald-600 text-[10px] font-black uppercase">📲 Enviar Reporte</button>
        </div>
        
        <div id="listaMovimientos" class="space-y-2 max-h-52 overflow-y-auto mb-6"></div>
        
        <div class="border-t pt-6 text-center">
            <button onclick="reiniciarApp()" class="text-[10px] text-rose-300 font-black uppercase mb-4">🗑️ Reiniciar Todo</button>
        </div>
    </div>

    <script>
        const WHATSAPP_SOPORTE = "573117700431";
        let storage = JSON.parse(localStorage.getItem('finanzas_v4')) || { 
            saldoInicial: 0, 
            movimientos: [], 
            fechaInstalacion: new Date().getTime(),
            ultimaRenovacion: null 
        };

        function verificarSuscripcion() {
            const ahora = new Date().getTime();
            const dias = (ahora - storage.fechaInstalacion) / (1000 * 60 * 60 * 24);
            if (dias > 15 && !storage.ultimaRenovacion) document.getElementById('paywall').classList.add('active');
        }

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('fechaHora').innerHTML = ahora.toLocaleDateString('es-CO') + '<br>' + ahora.toLocaleTimeString('es-CO', {hour12:true, hour:'2-digit', minute:'2-digit'});
        }
        setInterval(actualizarReloj, 1000);

        function actualizarVista() {
            const lista = document.getElementById('listaMovimientos');
            const saldoElement = document.getElementById('saldoActual');
            const setupDiv = document.getElementById('setupSaldo');
            
            // Mostrar/Ocultar Saldo Inicial
            setupDiv.style.display = (storage.saldoInicial === 0 && storage.movimientos.length === 0) ? 'block' : 'none';

            lista.innerHTML = '';
            let balanceHaciaArriba = parseFloat(storage.saldoInicial);

            // Generar la lista y calcular el total real
            storage.movimientos.forEach((m) => {
                if(m.tipo === 'INGRESO') balanceHaciaArriba += m.monto;
                else balanceHaciaArriba -= m.monto;

                lista.innerHTML = `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-gray-100 border-l-4 ${m.tipo === 'INGRESO' ? 'border-emerald-400' : 'border-rose-400'}">
                        <div>
                            <p class="text-sm font-bold text-gray-700">${m.concepto}</p>
                            <p class="text-[9px] text-gray-400">${m.hora}</p>
                        </div>
                        <span class="font-black ${m.tipo === 'INGRESO' ? 'text-emerald-600' : 'text-rose-600'}">
                            ${m.tipo === 'INGRESO' ? '+' : '-'}$${m.monto.toLocaleString()}
                        </span>
                    </div>` + lista.innerHTML;
            });

            // Si hay saldo inicial, mostrarlo al final de la lista
            if(storage.saldoInicial > 0) {
                lista.innerHTML += `<div class="p-3 bg-indigo-50 rounded-xl text-center text-[10px] font-bold text-indigo-400 uppercase italic">Capital Inicial: $${storage.saldoInicial.toLocaleString()}</div>`;
            }

            saldoElement.innerText = `$${balanceHaciaArriba.toLocaleString()}`;
            localStorage.setItem('finanzas_v4', JSON.stringify(storage));
        }

        function fijarSaldoInicial() {
            const val = document.getElementById('saldoInput').value;
            if(val) { storage.saldoInicial = parseFloat(val); document.getElementById('saldoInput').value=''; actualizarVista(); }
        }

        function registrar(tipo) {
            const m = document.getElementById('monto').value;
            const c = document.getElementById('concepto').value;
            const h = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: true });

            if(m && c) {
                storage.movimientos.push({ monto: parseFloat(m), concepto: c.toUpperCase(), tipo, hora: h });
                document.getElementById('monto').value = '';
                document.getElementById('concepto').value = '';
                actualizarVista();
            }
        }

        function enviarWhatsApp() {
            let b = parseFloat(storage.saldoInicial);
            let txt = "📊 *FINANZAS PARA BEBÉ - VIBRAS POSITIVAS*%0A%0A";
            txt += `💰 *INICIO:* $${b.toLocaleString()}%0A`;
            storage.movimientos.forEach(m => {
                b = (m.tipo === 'INGRESO') ? b + m.monto : b - m.monto;
                txt += `${m.tipo === 'INGRESO' ? '✅' : '🔻'} ${m.concepto}: $${m.monto.toLocaleString()}%0A`;
            });
            txt += `%0A💵 *SALDO FINAL: $${b.toLocaleString()}*`;
            window.open(`https://wa.me/${WHATSAPP_SOPORTE}?text=${txt}`, '_blank');
        }

        function reiniciarApp() {
            if(confirm('¿Borrar todo?')) { storage.saldoInicial = 0; storage.movimientos = []; actualizarVista(); }
        }

        function contactarSoporte() { window.open(`https://wa.me/${WHATSAPP_SOPORTE}?text=Activar suscripción`, '_blank'); }

        verificarSuscripcion();
        actualizarReloj();
        actualizarVista();
    </script>
</body>
</html>
