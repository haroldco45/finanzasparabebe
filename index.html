<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas para Bebé - Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden p-6 border border-gray-100">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-indigo-700 italic">👶 FINANZAS PARA BEBÉ</h1>
            <p class="text-[10px] text-gray-400 font-bold tracking-[0.2em] uppercase">Desarrollado por Vibras Positivas ©</p>
        </div>

        <div class="bg-gradient-to-br from-indigo-600 to-purple-700 p-6 rounded-2xl mb-6 text-white shadow-lg relative">
            <p class="text-[10px] opacity-80 uppercase font-bold tracking-wider">Saldo Disponible (COL)</p>
            <p id="saldoActual" class="text-4xl font-black tracking-tight">$0</p>
            <div id="fechaHora" class="absolute top-4 right-4 text-[9px] font-mono opacity-60 text-right"></div>
        </div>

        <div class="space-y-3 mb-6">
            <input type="text" id="concepto" placeholder="Concepto (Ej: Venta Arroz)" class="w-full p-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none text-sm">
            <input type="number" id="monto" placeholder="Valor $" class="w-full p-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none text-sm">
            
            <div class="flex gap-2">
                <button onclick="registrar('INGRESO')" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold text-xs hover:bg-green-600 transition shadow-md">➕ INGRESO</button>
                <button onclick="registrar('EGRESO')" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold text-xs hover:bg-red-600 transition shadow-md">➖ EGRESO</button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-3">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-tighter">Movimientos de hoy</h2>
            <button onclick="enviarWhatsApp()" class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold hover:bg-green-200 transition">📲 ENVIAR REPORTE</button>
        </div>
        
        <div id="listaMovimientos" class="space-y-2 max-h-52 overflow-y-auto mb-6"></div>
        
        <div class="border-t pt-4 text-center">
            <p class="text-[10px] text-gray-400 italic">© 2026 Vibras Positivas. Todos los derechos reservados.</p>
            <button onclick="reiniciarApp()" class="mt-2 text-[9px] text-red-300 hover:text-red-500 underline uppercase tracking-widest">Reiniciar base de datos</button>
        </div>
    </div>

    <script>
        let datos = JSON.parse(localStorage.getItem('finanzas_bebe_v2')) || { movimientos: [] };
        const WHATSAPP_DESTINO = "573117700431";

        function actualizarReloj() {
            const ahora = new Date();
            const opciones = { timeZone: 'America/Bogota', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.getElementById('fechaHora').innerHTML = ahora.toLocaleDateString('es-CO') + '<br>' + ahora.toLocaleTimeString('es-CO', opciones);
        }
        setInterval(actualizarReloj, 1000);

        function actualizarVista() {
            const lista = document.getElementById('listaMovimientos');
            const saldoElement = document.getElementById('saldoActual');
            lista.innerHTML = '';
            let balance = 0;

            [...datos.movimientos].reverse().forEach((m) => {
                const esIngreso = m.tipo === 'INGRESO';
                balance = esIngreso ? balance + m.monto : balance - m.monto;
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border-l-4 ${esIngreso ? 'border-green-400' : 'border-red-400'}">
                        <div>
                            <p class="text-sm font-bold text-gray-700 leading-tight">${m.concepto}</p>
                            <p class="text-[9px] text-gray-400 font-mono">${m.hora}</p>
                        </div>
                        <span class="font-black ${esIngreso ? 'text-green-600' : 'text-red-600'}">${esIngreso ? '+' : '-'}$${m.monto.toLocaleString()}</span>
                    </div>`;
            });

            saldoElement.innerText = `$${balance.toLocaleString()}`;
            localStorage.setItem('finanzas_bebe_v2', JSON.stringify(datos));
        }

        function registrar(tipo) {
            const monto = document.getElementById('monto').value;
            const concepto = document.getElementById('concepto').value;
            const hora = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: true });

            if(monto && concepto) {
                datos.movimientos.push({ monto: parseFloat(monto), concepto: concepto.toUpperCase(), tipo, hora });
                document.getElementById('monto').value = '';
                document.getElementById('concepto').value = '';
                actualizarVista();
            }
        }

        function enviarWhatsApp() {
            let balance = 0;
            let detalle = "📊 *REPORTE DIARIO - FINANZAS PARA BEBÉ*%0A";
            detalle += "✨ _Por: Vibras Positivas_%0A%0A";
            
            datos.movimientos.forEach(m => {
                const esIngreso = m.tipo === 'INGRESO';
                balance = esIngreso ? balance + m.monto : balance - m.monto;
                detalle += `${esIngreso ? '✅' : '🔻'} ${m.hora} - ${m.concepto}: *$${m.monto.toLocaleString()}*%0A`;
            });

            detalle += `%0A💰 *SALDO FINAL: $${balance.toLocaleString()}*`;
            window.open(`https://wa.me/${WHATSAPP_DESTINO}?text=${detalle}`, '_blank');
        }

        function reiniciarApp() {
            if(confirm('¿Borrar todo?')) {
                datos = { movimientos: [] };
                actualizarVista();
            }
        }

        actualizarReloj();
        actualizarVista();
    </script>
</body>
</html>
